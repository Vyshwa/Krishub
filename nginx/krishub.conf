# KrishHub nginx reference configuration
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=frontend:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name krishub.in www.krishub.in;
    server_tokens off;
    more_clear_headers Server;
    return 301 https://krishub.in$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.krishub.in;

    server_tokens off;
    more_clear_headers Server;

    ssl_certificate     /etc/letsencrypt/live/krishub.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/krishub.in/privkey.pem;

    return 301 https://krishub.in$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name krishub.in;

    # Hide server version
    server_tokens off;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
      text/plain
      text/css
      text/javascript
      application/javascript
      application/json
      application/xml
      image/svg+xml
      application/wasm;

    # --- TLS ---
    ssl_certificate     /etc/letsencrypt/live/krishub.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/krishub.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling disabled — cert has no OCSP responder URL
    # ssl_stapling on;
    # ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- Security headers (applied at nginx level too) ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://krishub.in wss://krishub.in; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://krishub.in; upgrade-insecure-requests" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Hide server identity and framework headers
    more_clear_headers Server;
    proxy_hide_header X-Powered-By;
    more_clear_headers X-NextJS-Cache;
    more_clear_headers X-NextJS-Prerender;
    more_clear_headers X-NextJS-Stale-Time;

    # --- Body size limit ---
    client_max_body_size 16k;

    # --- Proxy buffer limits ---
    proxy_buffer_size       4k;
    proxy_buffers           8 4k;
    proxy_busy_buffers_size 8k;

    # --- API backend ---
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://127.0.0.1:1002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # --- WebSocket for real-time PM2 metrics ---
    location /ws {
        proxy_pass http://127.0.0.1:1002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Stricter rate limit on auth endpoints
    location /api/auth/login {
        limit_req zone=api_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:1002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location /api/auth/register {
        limit_req zone=api_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:1002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # --- Static assets with long cache ---
    location /_next/static/ {
        proxy_pass http://127.0.0.1:1001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /assets/ {
        proxy_pass http://127.0.0.1:1001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location ~* ^/.*\.(ico|png|svg|webp|jpg|jpeg|woff2?|ttf|otf)$ {
        proxy_pass http://127.0.0.1:1001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # --- File downloads (served directly, bypass Next.js) ---
    location ^~ /dl/ {
        alias /k_live/krishub/frontend/public/dl/;
        autoindex off;
        types {
            application/vnd.android.package-archive apk;
        }
        add_header Content-Disposition "attachment" always;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # --- Frontend ---
    location / {
        limit_req zone=frontend burst=50 nodelay;
        proxy_pass http://127.0.0.1:1001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block sensitive file extensions
    location ~* \.(env|config|ini|yaml|yml|sql|bak|tmp|old|log|swp)$ {
        deny all;
        return 404;
    }
}
